apiVersion: v1
kind: Service
metadata:
  name: portal-shell
  namespace: smartwarehouse
spec:
  selector:
    app.kubernetes.io/name: portal-shell
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-shell
  namespace: smartwarehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal-shell
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal-shell
        app.kubernetes.io/part-of: smartwarehouse-ai
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: portal-shell
          image: registry.cn-hangzhou.aliyuncs.com/smartwarehouse/portal-shell:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
