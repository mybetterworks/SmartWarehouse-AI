server:
  port: 9200

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${SMARTWAREHOUSE_REDIS_HOST:127.0.0.1}
      # 本地默认值直接连接 deploy/local/docker-compose.yml 暴露的 SmartWarehouse-AI 专属 Redis。
      # Docker 容器部署时由 compose 注入 redis:6379，正式环境由环境变量或配置中心覆盖。
      port: ${SMARTWAREHOUSE_REDIS_PORT:16381}
      password: ${SMARTWAREHOUSE_REDIS_PASSWORD:}
      timeout: 3s
  cloud:
    nacos:
      discovery:
        server-addr: ${SMARTWAREHOUSE_NACOS_SERVER_ADDR:127.0.0.1:18848}
        namespace: ${SMARTWAREHOUSE_NACOS_NAMESPACE:}
        group: ${SMARTWAREHOUSE_NACOS_GROUP:DEFAULT_GROUP}
        enabled: ${SMARTWAREHOUSE_NACOS_DISCOVERY_ENABLED:true}
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

smartwarehouse:
  jwt:
    secret: ${SMARTWAREHOUSE_JWT_SECRET:change-me-in-local-dev-only-at-least-32-chars}
  gateway:
    routes:
      sys: ${SYS_SERVICE_URI:lb://sys-service}
      wms: ${WMS_SERVICE_URI:http://127.0.0.1:9202}
      mes: ${MES_SERVICE_URI:http://127.0.0.1:9203}
      task: ${TASK_SERVICE_URI:http://127.0.0.1:9204}
      ai: ${AI_SERVICE_URI:http://127.0.0.1:9205}
