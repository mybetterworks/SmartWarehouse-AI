server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /apps/sys/ {
    try_files $uri $uri/ /apps/sys/index.html;
  }

  location /api/ {
    proxy_pass http://gateway-service:9200/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
