apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-nginx-config
  namespace: smartwarehouse
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      client_max_body_size 20m;

      location /api/ {
        proxy_pass http://gateway-service:9200/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /apps/sys/ {
        proxy_pass http://sys-web:80/apps/sys/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        proxy_pass http://portal-shell:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: edge-nginx
  namespace: smartwarehouse
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: edge-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-nginx
  namespace: smartwarehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-nginx
        app.kubernetes.io/part-of: smartwarehouse-ai
    spec:
      containers:
        - name: edge-nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: edge-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: edge-nginx-config
          configMap:
            name: edge-nginx-config
